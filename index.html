<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Math'Clic</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f7ff;
      color: #222;
    }

    header {
      background: #2d6cdf;
      color: white;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    .container {
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #2d6cdf;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Math'Up 📐</h1>
  <p>Le déclic pour réussir en maths !</p>
</header>

<div class="container">

  <div class="card">
    <h2>📚 Cours de mathématiques</h2>
    <p>Du collège au lycée, les fondamentaux.</p>
    <a class="btn" href="#">Commencer</a>
  </div>

  <div class="card">
    <h2>🧠 Réservation</h2>
    <p>Cet espace te permet de réserver le premier cours.</p>
    <a class="btn" href="#">S'entraîner</a>
  </div>

</div>

</body>
</html>
